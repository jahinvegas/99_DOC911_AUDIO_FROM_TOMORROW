
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JAHINVEGAS | Squeaky G</title>
  <style>
    :root {
      --bg-0: #05060f;
      --bg-1: #11132a;
      --primary: #65f0ff;
      --secondary: #be7bff;
      --accent: #62ffcf;
      --text: #f6f8ff;
      --muted: #bac2e8;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-stroke: rgba(255, 255, 255, 0.18);
      --shadow: 0 12px 40px rgba(62, 26, 133, 0.35);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% 20%, #1f2558 0%, transparent 36%),
                  radial-gradient(circle at 80% 15%, #4a1b72 0%, transparent 36%),
                  radial-gradient(circle at 40% 85%, #0f7f98 0%, transparent 30%),
                  linear-gradient(140deg, var(--bg-0) 0%, var(--bg-1) 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -100px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.22;
      background: conic-gradient(from 180deg at 50% 50%, transparent, #7f58ff, transparent, #3cd5ff, transparent);
      animation: spin 18s linear infinite;
    }

    body::after {
      animation-direction: reverse;
      animation-duration: 26s;
      filter: blur(40px);
      opacity: 0.14;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 rgba(101, 240, 255, 0.1), 0 0 32px rgba(190, 123, 255, 0.14); }
      50% { box-shadow: 0 0 0 rgba(101, 240, 255, 0.25), 0 0 52px rgba(190, 123, 255, 0.28); }
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(26px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .site-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .top-bar,
    .footer {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: linear-gradient(120deg, rgba(255,255,255,0.1), rgba(255,255,255,0.04));
      border-bottom: 1px solid var(--glass-stroke);
      border-top: 1px solid rgba(255,255,255,0.12);
      padding: 14px clamp(16px, 4vw, 42px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      font-size: clamp(0.9rem, 2vw, 1.08rem);
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text;
      color: transparent;
    }

    .top-bar-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .active-signal {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1;
      white-space: nowrap;
    }

    .active-signal::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(98, 255, 207, 0.65);
      flex: 0 0 auto;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .nav-btn {
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.88rem;
      transition: 0.25s ease;
      cursor: pointer;
    }

    .nav-btn:hover,
    .nav-btn.active {
      border-color: rgba(101,240,255,0.7);
      color: #ffffff;
      background: linear-gradient(100deg, rgba(101,240,255,0.22), rgba(190,123,255,0.26));
      transform: translateY(-1px);
    }

    .skip-link {
      position: absolute;
      left: 16px;
      top: -56px;
      z-index: 50;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(100deg, #4de4ff, #ab7fff, #4bffce);
      color: #05060f;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      transition: top 0.2s ease;
    }

    .skip-link:focus,
    .skip-link:focus-visible {
      top: 16px;
    }

    main {
      width: min(1180px, 92vw);
      margin: 28px auto 36px;
      flex: 1;
    }

    .page {
      display: none;
      animation: pageIn 0.5s ease both;
    }

    .page.active {
      display: block;
    }

    .glass-card {
      border: 1px solid var(--glass-stroke);
      background: linear-gradient(120deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3.5vw, 36px);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 24px;
      align-items: center;
    }

    .hero h1 {
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-shadow: 0 0 22px rgba(101,240,255,0.35);
    }

    .hero h1 span {
      display: block;
      background: linear-gradient(120deg, #fefefe, var(--primary) 40%, var(--secondary) 75%, var(--accent));
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.65;
      max-width: 60ch;
      margin: 14px 0 24px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .cta {
      border: none;
      border-radius: 999px;
      padding: 11px 18px;
      color: #fff;
      background: linear-gradient(100deg, #4de4ff, #ab7fff, #4bffce);
      background-size: 180% 180%;
      animation: pulseGlow 3s ease-in-out infinite;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .cta.secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.22);
      animation: none;
    }

    .nav-btn:focus-visible,
    .cta:focus-visible,
    .playlist-meta a:focus-visible,
    .skip-link:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 3px;
      box-shadow: 0 0 0 4px rgba(101, 240, 255, 0.2);
    }

    .hero-visual {
      min-height: 280px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.2);
      background:
        radial-gradient(circle at 30% 30%, rgba(107, 244, 255, 0.75), transparent 45%),
        radial-gradient(circle at 70% 65%, rgba(201, 123, 255, 0.6), transparent 45%),
        linear-gradient(140deg, rgba(255,255,255,0.14), rgba(255,255,255,0.02));
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      animation: float 4s ease-in-out infinite;
    }

    .hero-visual::before {
      content: "SQUEAKY G";
      letter-spacing: 3px;
      font-weight: 800;
      font-size: clamp(1rem, 4vw, 1.7rem);
      text-shadow: 0 0 22px rgba(255,255,255,0.4);
    }

    .stats {
      margin-top: 22px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
    }

    .stat {
      text-align: center;
      border-radius: 16px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
    }

    .stat strong {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 4px;
      color: var(--primary);
    }

    .home-stack {
      display: grid;
      gap: 24px;
    }

    .featured-playlist {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 22px;
      align-items: center;
    }

    .featured-kicker {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .featured-playlist h2 {
      font-size: clamp(1.5rem, 3.6vw, 2.3rem);
      margin-bottom: 10px;
    }

    .featured-playlist p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .featured-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .featured-panel {
      min-height: 220px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.18);
      background:
        radial-gradient(circle at 25% 25%, rgba(101, 240, 255, 0.3), transparent 34%),
        radial-gradient(circle at 75% 70%, rgba(190, 123, 255, 0.28), transparent 36%),
        linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .featured-panel strong {
      display: block;
      font-size: clamp(1.4rem, 4vw, 2rem);
      margin-bottom: 8px;
      color: var(--primary);
      text-shadow: 0 0 18px rgba(101,240,255,0.2);
    }

    .featured-panel span {
      color: var(--muted);
      line-height: 1.6;
      max-width: 24ch;
    }

    .section-lead {
      color: var(--muted);
      margin-top: 10px;
      margin-bottom: 18px;
      line-height: 1.65;
    }

    .playlist-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .playlist-empty-state {
      padding: 24px;
      border-radius: 18px;
      border: 1px dashed rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      line-height: 1.6;
    }

    .playlist-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 220px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.16);
      background: linear-gradient(160deg, rgba(255,255,255,0.09), rgba(255,255,255,0.04));
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .playlist-card-kicker {
      display: inline-block;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .playlist-card h3 {
      font-size: 1.2rem;
    }

    .playlist-card p {
      color: var(--muted);
      line-height: 1.6;
      margin: 0;
      flex: 1;
    }

    .playlist-card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .playlist-card-actions .cta,
    .playlist-card-actions .cta.secondary {
      min-width: 140px;
    }

    .playlist-page h2 {
      margin-bottom: 10px;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
    }

    .playlist-page p {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .player-shell {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
      background: #000;
      box-shadow: 0 10px 34px rgba(0,0,0,0.35);
    }

    .player-shell iframe,
    .player-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
      display: block;
    }

    .player-placeholder {
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 30% 30%, rgba(101, 240, 255, 0.18), transparent 35%),
        radial-gradient(circle at 70% 60%, rgba(190, 123, 255, 0.16), transparent 38%),
        linear-gradient(140deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    }

    .player-placeholder-copy {
      text-align: center;
      max-width: 34ch;
      color: var(--text);
    }

    .player-placeholder-copy strong {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .player-placeholder-copy span {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .playlist-meta {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #d5dbff;
      word-break: break-word;
      opacity: 0.9;
    }

    .playlist-meta a {
      color: var(--primary);
      text-decoration: none;
    }

    .playlist-meta a:hover {
      text-decoration: underline;
    }

    .playlist-actions {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .playlist-actions .cta {
      min-width: 210px;
    }

    .playlist-feedback {
      margin-top: 10px;
      min-height: 1.2em;
      font-size: 0.9rem;
      color: var(--accent);
    }

    .footer {
      margin-top: auto;
      position: static;
      border-top: 1px solid var(--glass-stroke);
      border-bottom: none;
      font-size: 0.85rem;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .hero,
      .featured-playlist {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .top-bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

      .nav-links {
        justify-content: flex-start;
      }
    }

    @media (max-width: 520px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .nav-btn {
        font-size: 0.78rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      body::before,
      body::after,
      .hero-visual,
      .cta,
      .page {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#app">Skip to content</a>
  <div class="site-wrap">
    <header class="top-bar">
      <div class="top-bar-group">
        <div class="brand">JAHINVEGAS</div>
        <div class="active-signal" id="activeSignal" aria-live="polite">Viewing • Home</div>
      </div>
      <nav class="nav-links" id="navLinks" aria-label="Main navigation"></nav>
    </header>

    <main id="app" tabindex="-1"></main>

    <footer class="footer">
      <span class="brand">JAHINVEGAS</span>
      <span>Future Sound Architecture • Artist Portal for Squeaky G</span>
    </footer>
  </div>

  <script>
    /*
      ==========================================
      EASY CONFIG SECTION (ADD NEW PLAYLIST PAGES HERE)
      ==========================================

      How to add a new playlist page:
      1) Copy one object in `playlistPages`.
      2) Change: id, title, description, playlistUrl.
      3) Save file. The navigation + page + embed are auto-generated.

      playlistUrl should be a normal YouTube playlist URL, for example:
      https://www.youtube.com/playlist?list=PLxxxxxxxxxxxxxxxx
    */
    const siteConfig = {
      artistName: "Squeaky G",
      playlistPages: [
        {
          id: "playlist-orbit-visions",
          title: "Orbit Visions",
          description: "Atmospheric mixes built for midnight hyperdrives.",
          playlistUrl: "https://www.youtube.com/playlist?list=PLrYD4SJlktuI4tGQhxHrNth5-WoLwIHcT"
        },
        {
          id: "playlist-neon-freq",
          title: "Neon Freq",
          description: "Future wave cuts and skyline anthems in one stream.",
          playlistUrl: "https://www.youtube.com/playlist?list=PLrYD4SJlktuKbJjaDubma4fQDjUL-wUAR"
        },
        {
          id: "playlist-cyber",
          title: "cyber",
          description: "High-voltage sonic sessions from the neon underground.",
          playlistUrl: "https://www.youtube.com/playlist?list=PLrYD4SJlktuJjVzqM_TXWbZ_GPHS3kJKf"
        }
      ]
    };

    const app = document.getElementById("app");
    const navLinks = document.getElementById("navLinks");
    const activeSignal = document.getElementById("activeSignal");
    const documentTitleBase = "JAHINVEGAS";
    const lastPlaylistStorageKey = "jahinvegas:last-playlist-page";
    let currentPageId = "";

    function getPlaylistId(url) {
      try {
        const parsed = new URL(url);
        return parsed.searchParams.get("list") || "";
      } catch (error) {
        return "";
      }
    }

    function getEmbedUrl(playlistUrl) {
      const listId = getPlaylistId(playlistUrl);
      if (!listId) return "";
      return `https://www.youtube.com/embed/videoseries?list=${encodeURIComponent(listId)}`;
    }

    function validatePlaylistPages(playlistPages) {
      const pagesToValidate = Array.isArray(playlistPages) ? playlistPages : [];
      const seenIds = new Set();
      const warnings = [];

      const validPages = pagesToValidate.reduce((validList, playlist, index) => {
        const label = `playlistPages[${index}]`;

        if (!playlist || typeof playlist !== "object") {
          warnings.push(`${label} was skipped because it is not a valid object.`);
          return validList;
        }

        const normalizedPlaylist = {
          id: typeof playlist.id === "string" ? playlist.id.trim() : "",
          title: typeof playlist.title === "string" ? playlist.title.trim() : "",
          description: typeof playlist.description === "string" && playlist.description.trim()
            ? playlist.description.trim()
            : "Playlist stream ready to launch.",
          playlistUrl: typeof playlist.playlistUrl === "string" ? playlist.playlistUrl.trim() : ""
        };

        if (!normalizedPlaylist.id) {
          warnings.push(`${label} was skipped because it is missing a valid id.`);
          return validList;
        }

        if (seenIds.has(normalizedPlaylist.id)) {
          warnings.push(`${label} was skipped because the id "${normalizedPlaylist.id}" is duplicated.`);
          return validList;
        }

        if (!normalizedPlaylist.title) {
          warnings.push(`${label} was skipped because it is missing a valid title.`);
          return validList;
        }

        if (!normalizedPlaylist.playlistUrl) {
          warnings.push(`${label} was skipped because it is missing a playlistUrl.`);
          return validList;
        }

        if (!getPlaylistId(normalizedPlaylist.playlistUrl)) {
          warnings.push(`${label} was skipped because playlistUrl does not contain a valid YouTube list id.`);
          return validList;
        }

        seenIds.add(normalizedPlaylist.id);
        validList.push(normalizedPlaylist);
        return validList;
      }, []);

      return {
        validPages,
        warnings
      };
    }

    const validationResult = validatePlaylistPages(siteConfig.playlistPages);
    const configWarnings = validationResult.warnings;
    siteConfig.playlistPages = validationResult.validPages;
    const playlistPageIds = new Set(siteConfig.playlistPages.map((playlist) => playlist.id));

    if (configWarnings.length) {
      console.warn("Playlist config validation warnings:", configWarnings);
    }

    function getPlayerPlaceholderMarkup(title) {
      return `
        <div class="player-placeholder" data-player-placeholder>
          <div class="player-placeholder-copy">
            <strong>${title}</strong>
            <span>Player loads when this playlist page is active for faster performance.</span>
          </div>
        </div>
      `;
    }

    function createPlaylistIframe(embedUrl, title) {
      const iframe = document.createElement("iframe");
      iframe.loading = "lazy";
      iframe.src = embedUrl;
      iframe.title = `${title} YouTube Playlist`;
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.allowFullscreen = true;
      return iframe;
    }

    function syncActivePlaylistPlayer(activePageId) {
      document.querySelectorAll(".player-shell[data-page-id]").forEach((shell) => {
        const embedUrl = shell.dataset.embedUrl;
        const title = shell.dataset.playlistTitle || "Playlist";
        const isActiveShell = shell.dataset.pageId === activePageId;
        const existingIframe = shell.querySelector("iframe");

        if (!embedUrl) return;

        if (isActiveShell) {
          if (!existingIframe) {
            shell.innerHTML = "";
            shell.appendChild(createPlaylistIframe(embedUrl, title));
          }
        } else if (existingIframe) {
          shell.innerHTML = getPlayerPlaceholderMarkup(title);
        }
      });
    }

    function getStoredPlaylistPage() {
      try {
        const storedPage = window.localStorage.getItem(lastPlaylistStorageKey) || "";
        return playlistPageIds.has(storedPage) ? storedPage : "";
      } catch (error) {
        return "";
      }
    }

    function rememberPlaylistPage(pageId) {
      if (!playlistPageIds.has(pageId)) return;

      try {
        window.localStorage.setItem(lastPlaylistStorageKey, pageId);
      } catch (error) {
        // Ignore storage failures (private mode / browser restrictions).
      }
    }

    function getPlaylistPageUrl(pageId) {
      const shareUrl = new URL(window.location.href);
      shareUrl.hash = pageId;
      return shareUrl.toString();
    }

    function setPlaylistFeedback(pageId, message) {
      const feedbackEl = document.querySelector(`[data-share-feedback="${pageId}"]`);
      if (!feedbackEl) return;
      feedbackEl.textContent = message;

      if (feedbackEl._clearTimer) {
        window.clearTimeout(feedbackEl._clearTimer);
      }

      if (message) {
        feedbackEl._clearTimer = window.setTimeout(() => {
          feedbackEl.textContent = "";
        }, 2600);
      }
    }

    function scrollToTopOnPageChange(nextPageId) {
      const isFirstRender = !currentPageId;
      const isNewPage = currentPageId && currentPageId !== nextPageId;

      if (!isFirstRender && !isNewPage) return;
      if (isFirstRender) return;

      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      window.scrollTo({
        top: 0,
        behavior: prefersReducedMotion ? "auto" : "smooth"
      });
    }

    function updateActiveSignal(activePage) {
      if (!activeSignal || !activePage) return;

      const signalPrefix = playlistPageIds.has(activePage.id)
        ? "Active Playlist"
        : "Viewing";

      activeSignal.textContent = `${signalPrefix} • ${activePage.navLabel}`;
    }

    async function sharePlaylistPage(pageId, title) {
      const shareUrl = getPlaylistPageUrl(pageId);
      const shareData = {
        title: `${documentTitleBase} | ${title}`,
        text: `Listen to ${title} on ${documentTitleBase}`,
        url: shareUrl
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
          setPlaylistFeedback(pageId, "Playlist link shared.");
          return;
        } catch (error) {
          if (error && error.name === "AbortError") {
            setPlaylistFeedback(pageId, "");
            return;
          }
        }
      }

      try {
        await navigator.clipboard.writeText(shareUrl);
        setPlaylistFeedback(pageId, "Playlist link copied to clipboard.");
        return;
      } catch (error) {
        window.prompt("Copy this playlist link:", shareUrl);
        setPlaylistFeedback(pageId, "Copy dialog opened for this playlist link.");
      }
    }

    function buildPages() {
      const pages = [];
      const featuredPlaylist = siteConfig.playlistPages[0] || null;

      pages.push({
        id: "home",
        navLabel: "Home",
        html: `
          <section class="page active" data-page="home">
            <div class="home-stack">
              <div class="glass-card hero">
                <div>
                  <h1>
                    <span>${siteConfig.artistName}</span>
                    Audio From Tomorrow
                  </h1>
                  <p>
                    Welcome to the digital stage of <strong>${siteConfig.artistName}</strong> — where cosmic basslines,
                    glitch melodies, and out-of-this-world visuals merge into one immersive portal.
                    Navigate through curated YouTube playlist hubs and expand this universe as new drops arrive.
                  </p>
                  <div class="hero-actions">
                    <a href="#${siteConfig.playlistPages[0]?.id || "home"}" class="cta">Launch Playlist Stream</a>
                    <a href="#about" class="cta secondary">About The Signal</a>
                  </div>
                  <div class="stats">
                    <div class="stat"><strong>∞</strong>Future Vibes</div>
                    <div class="stat"><strong>24/7</strong>Stream Ready</div>
                    <div class="stat"><strong>100%</strong>Neon Energy</div>
                  </div>
                </div>
                <div class="hero-visual" aria-hidden="true"></div>
              </div>

              ${featuredPlaylist
                ? `
                    <div class="glass-card featured-playlist">
                      <div>
                        <span class="featured-kicker">Featured Transmission</span>
                        <h2>${featuredPlaylist.title}</h2>
                        <p>
                          ${featuredPlaylist.description} Start here for the current highlighted channel and jump straight into the latest signal path.
                        </p>
                        <div class="featured-actions">
                          <a href="#${featuredPlaylist.id}" class="cta">Open Featured Playlist</a>
                          <a href="${featuredPlaylist.playlistUrl}" class="cta secondary" target="_blank" rel="noopener noreferrer">View on YouTube</a>
                        </div>
                      </div>
                      <div class="featured-panel" aria-hidden="true">
                        <div>
                          <strong>${featuredPlaylist.title}</strong>
                          <span>Primary launch channel for the Audio From Tomorrow portal.</span>
                        </div>
                      </div>
                    </div>
                  `
                : `
                    <div class="glass-card">
                      <h2>Featured Transmission</h2>
                      <div class="playlist-empty-state">No featured playlist is available yet. Add a valid playlist in the config section to spotlight it here.</div>
                    </div>
                  `
              }

              <div class="glass-card">
                <h2>Playlist Channels</h2>
                <p class="section-lead">
                  Jump directly into each signal stream and move between the latest curated playlist worlds.
                </p>
                <div class="playlist-grid">
                  ${siteConfig.playlistPages.length
                    ? siteConfig.playlistPages.map((playlist, index) => `
                        <article class="playlist-card">
                          <span class="playlist-card-kicker">Playlist ${(index + 1).toString().padStart(2, "0")}</span>
                          <h3>${playlist.title}</h3>
                          <p>${playlist.description}</p>
                          <div class="playlist-card-actions">
                            <a href="#${playlist.id}" class="cta">Open Playlist</a>
                            <a href="${playlist.playlistUrl}" class="cta secondary" target="_blank" rel="noopener noreferrer">YouTube</a>
                          </div>
                        </article>
                      `).join("")
                    : `<div class="playlist-empty-state">No valid playlists are configured yet. Add a YouTube playlist URL with a valid <code>?list=</code> value in the config section to publish a new channel.</div>`
                  }
                </div>
              </div>
            </div>
          </section>
        `
      });

      pages.push({
        id: "about",
        navLabel: "About",
        html: `
          <section class="page" data-page="about">
            <div class="glass-card">
              <h2>About ${siteConfig.artistName}</h2>
              <p>
                ${siteConfig.artistName} is a sonic architect blending high-energy rhythm patterns,
                futuristic textures, and melodic motion into a signature style designed for massive
                systems and night-drive headphones alike.
              </p>
              <p>
                This portal is powered by <strong>JAHINVEGAS</strong> and built as a single-file SPA,
                making it ultra-portable, easy to edit, and ready for rapid playlist expansion.
              </p>
            </div>
          </section>
        `
      });

      siteConfig.playlistPages.forEach((playlist) => {
        const safeId = playlist.id;
        const embedUrl = getEmbedUrl(playlist.playlistUrl);

        pages.push({
          id: safeId,
          navLabel: playlist.title,
          html: `
            <section class="page playlist-page" data-page="${safeId}">
              <div class="glass-card">
                <h2>${playlist.title}</h2>
                <p>${playlist.description}</p>
                <div
                  class="player-shell"
                  data-page-id="${safeId}"
                  data-embed-url="${embedUrl}"
                  data-playlist-title="${playlist.title}"
                >
                  ${embedUrl
                    ? `<div class="player-placeholder" data-player-placeholder>
                        <div class="player-placeholder-copy">
                          <strong>${playlist.title}</strong>
                          <span>Player loads when this playlist page is active for faster performance.</span>
                        </div>
                      </div>`
                    : `<div style="padding: 28px; color: #fff;">Invalid playlist URL. Please check the configuration object.</div>`
                  }
                </div>
                <div class="playlist-meta">
                  Source URL:
                  <a href="${playlist.playlistUrl}" target="_blank" rel="noopener noreferrer">${playlist.playlistUrl}</a>
                </div>
                <div class="playlist-actions">
                  <button
                    type="button"
                    class="cta"
                    data-share-playlist="${safeId}"
                    data-share-title="${playlist.title}"
                    aria-label="Share ${playlist.title} playlist page"
                  >
                    Share Playlist
                  </button>
                  <a
                    href="${playlist.playlistUrl}"
                    class="cta secondary"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="Open ${playlist.title} on YouTube"
                  >
                    Open on YouTube
                  </a>
                </div>
                <div class="playlist-feedback" data-share-feedback="${safeId}" aria-live="polite"></div>
              </div>
            </section>
          `
        });
      });

      return pages;
    }

    const pages = buildPages();

    function render() {
      navLinks.innerHTML = pages
        .map((page) => `<a href="#${page.id}" class="nav-btn" data-link="${page.id}">${page.navLabel}</a>`)
        .join("");

      app.innerHTML = pages.map((page) => page.html).join("");
    }

    function setActivePage() {
      const hash = window.location.hash.replace("#", "");
      const requestedPage = pages.find((page) => page.id === hash) ? hash : "";
      const nextPage = requestedPage || getStoredPlaylistPage() || "home";
      const activePage = pages.find((page) => page.id === nextPage) || pages[0];

      scrollToTopOnPageChange(nextPage);

      document.querySelectorAll(".page").forEach((pageEl) => {
        pageEl.classList.toggle("active", pageEl.dataset.page === nextPage);
      });

      document.querySelectorAll(".nav-btn").forEach((btn) => {
        const isActive = btn.dataset.link === nextPage;
        btn.classList.toggle("active", isActive);

        if (isActive) {
          btn.setAttribute("aria-current", "page");
        } else {
          btn.removeAttribute("aria-current");
        }
      });

      if (playlistPageIds.has(nextPage)) {
        rememberPlaylistPage(nextPage);
      }

      syncActivePlaylistPlayer(nextPage);
      updateActiveSignal(activePage);
      document.title = `${documentTitleBase} | ${activePage.navLabel}`;
      currentPageId = nextPage;
    }

    render();
    setActivePage();

    app.addEventListener("click", (event) => {
      const shareButton = event.target.closest("[data-share-playlist]");
      if (!shareButton) return;

      event.preventDefault();
      sharePlaylistPage(
        shareButton.dataset.sharePlaylist || "",
        shareButton.dataset.shareTitle || "Playlist"
      );
    });

    window.addEventListener("hashchange", setActivePage);
  </script>
</body>
</html>
